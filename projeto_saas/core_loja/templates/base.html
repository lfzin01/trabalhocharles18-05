<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>{{ empresa.nome }} | Painel SaaS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstra
p.min.css" rel="stylesheet">
    <style>
        body {
            display: flex;
            min-height: 100vh;
            background-color: #f4f7f6;
        }

        #sidebar {
            width: 250px;
            background: #2c3e50;
            color: white;
            padding: 20px;
        }

        #content {
            flex: 1;
            padding: 40px;
        }

        .nav-link {
            color: #bdc3c7;
            margin: 10px 0;
        }

        .nav-link:hover {
            color: white;
            background: #34495e;
            border-radius: 5px;
        }
    </style>
</head>

<body>
    <div id="sidebar">
        <h4>{{ empresa.nome }}</h4>
        <p class="small">{{ empresa.ramo }}</p>
        <hr>
        <nav class="nav flex-column">
            <a class="nav-link" href="/loja/{{ empresa.id }}/">
                Produtos</a>
            <a class="nav-link" href="/loja/{{ empresa.id }}/novocliente/"> Novo Cliente</a>
            <a class="nav-link" href="/loja/{{ empresa.id }}/novoproduto/"> Novo Produto</a>
        </nav>
    </div>
    <div id="content">
        {% block conteudo %}{% endblock %}
    </div>
</body>

</html>
